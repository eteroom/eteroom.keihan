<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像一覧印刷ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- HEIC変換用ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        #preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 200px;
        }

        .page-container {
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            box-sizing: border-box;
            display: grid !important;
            overflow: hidden;
            padding: 10mm 10mm 10mm 30mm;
            position: relative;
        }

        .image-item {
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background: white;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* 外枠を削除 */
            border: none;
        }

        .file-name {
            font-size: 7.5pt;
            font-weight: bold;
            text-align: center;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 7mm;
            line-height: 3.5mm;
            color: #111;
            margin-bottom: 1mm;
            width: 100%;
        }

        .img-box {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100%;
            background-color: #ffffff;
            flex-grow: 1;
        }

        .img-box img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body id="drop-zone">

    <div class="no-print w-full bg-white border-b shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto space-y-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-bold text-gray-800">📸 画像一覧PDF作成</h1>
                </div>
                <div class="flex flex-col md:flex-row items-end md:items-center gap-2 w-full md:w-auto">
                    <div class="flex flex-col w-full md:w-64 text-right">
                        <label class="text-xs font-bold text-gray-500 mr-1">保存ファイル名</label>
                        <input type="text" id="output-filename" placeholder="image_catalog" class="p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button onclick="handleSavePDF()" id="pdf-btn" class="bg-blue-600 text-white px-10 py-2 rounded-lg font-bold hover:bg-blue-700 shadow-md transition text-lg w-full md:w-auto">
                        📄 PDFを保存
                    </button>
                </div>
            </div>

            <div id="select-area" class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-xl text-center">
                <label class="cursor-pointer">
                    <span class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold inline-block mb-2">
                        ＋ 画像ファイルを選択
                    </span>
                    <input type="file" id="image-input" multiple accept="image/*,.heic,.HEIC" class="hidden">
                    <p class="text-sm text-blue-600 font-medium">JPG, PNG, HEICをドロップ</p>
                </label>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 bg-gray-50 p-3 rounded-lg border text-sm">
                <div>
                    <label class="block font-bold mb-1">用紙サイズ</label>
                    <select id="page-size" onchange="render()" class="w-full p-2 border rounded">
                        <option value="a4">A4</option>
                        <option value="a3" selected>A3</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold mb-1">向き</label>
                    <select id="orientation" onchange="render()" class="w-full p-2 border rounded">
                        <option value="p">縦</option>
                        <option value="l" selected>横</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold mb-1">列数 (横)</label>
                    <input type="number" id="cols" value="4" min="1" oninput="render()" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block font-bold mb-1">行数 (縦)</label>
                    <input type="number" id="rows" value="5" min="1" oninput="render()" class="w-full p-2 border rounded">
                </div>
            </div>
        </div>
    </div>

    <div id="preview-area" class="no-print">
        <div class="mt-20 text-gray-400 text-center" id="empty-msg">
            <p class="text-lg font-bold">画像が選択されていません</p>
            <p class="text-sm">HEICファイルもそのまま選択可能です</p>
        </div>
    </div>

    <div id="working-area" style="position: fixed; left: -9999px; top: 0; z-index: -1;"></div>

    <script>
        let imagesData = [];

        document.getElementById('image-input').addEventListener('change', (e) => {
            if (e.target.files) handleFiles(Array.from(e.target.files));
        });
        
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer && e.dataTransfer.files) {
                handleFiles(Array.from(e.dataTransfer.files));
            }
        });

        async function handleFiles(files) {
            const preview = document.getElementById('preview-area');
            const originalContent = preview.innerHTML;
            preview.innerHTML = '<div class="mt-20 text-blue-600 text-center"><p class="text-lg font-bold animate-pulse">画像を処理中... (HEIC変換には時間がかかる場合があります)</p></div>';

            const imageFiles = files.filter(f => 
                f.type.startsWith('image/') || 
                f.name.toLowerCase().endsWith('.heic')
            );
            
            if (imageFiles.length === 0) {
                preview.innerHTML = originalContent;
                return;
            }
            
            imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            
            const newImages = await Promise.all(imageFiles.map(async (file) => {
                try {
                    let blob = file;
                    if (file.name.toLowerCase().endsWith('.heic')) {
                        const converted = await heic2any({
                            blob: file,
                            toType: "image/jpeg",
                            quality: 0.8
                        });
                        blob = Array.isArray(converted) ? converted[0] : converted;
                    }

                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (ev) => resolve({ name: file.name, src: ev.target.result });
                        reader.onerror = () => resolve(null);
                        reader.readAsDataURL(blob);
                    });
                } catch (err) {
                    console.error("File processing error:", file.name, err);
                    return null;
                }
            }));
            
            imagesData = newImages.filter(img => img !== null);
            render();
        }

        function createPageElement(images, config) {
            const page = document.createElement('div');
            page.className = 'page-container';
            page.style.width = config.w;
            page.style.height = config.h;
            page.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            page.style.gridTemplateRows = `repeat(${config.rows}, 1fr)`;
            page.style.gap = '4mm';

            const hNum = parseInt(config.h);
            const paddingTotal = 20; 
            const gridGapTotal = (config.rows - 1) * 4;
            const itemHeight = (hNum - paddingTotal - gridGapTotal) / config.rows;
            const imgBoxHeight = Math.max(10, itemHeight - 8); 

            images.forEach(data => {
                const item = document.createElement('div');
                item.className = 'image-item';
                
                const label = document.createElement('div');
                label.className = 'file-name';
                label.textContent = data.name;
                
                const box = document.createElement('div');
                box.className = 'img-box';
                box.style.height = `${imgBoxHeight}mm`; 
                
                const img = document.createElement('img');
                img.src = data.src;
                
                box.appendChild(img);
                item.appendChild(label);
                item.appendChild(box);
                page.appendChild(item);
            });
            return page;
        }

        function render() {
            const preview = document.getElementById('preview-area');
            const pageSize = document.getElementById('page-size').value;
            const orientation = document.getElementById('orientation').value;
            const cols = parseInt(document.getElementById('cols').value) || 1;
            const rows = parseInt(document.getElementById('rows').value) || 1;

            preview.innerHTML = '';
            if (imagesData.length === 0) {
                preview.innerHTML = '<div class="mt-20 text-gray-400 text-center"><p class="text-lg font-bold">画像が選択されていません</p></div>';
                return;
            }

            const config = {
                w: (pageSize === 'a3' ? (orientation === 'l' ? '420mm' : '297mm') : (orientation === 'l' ? '297mm' : '210mm')),
                h: (pageSize === 'a3' ? (orientation === 'l' ? '297mm' : '420mm') : (orientation === 'l' ? '210mm' : '297mm')),
                cols, rows
            };

            const perPage = cols * rows;
            for (let i = 0; i < imagesData.length; i += perPage) {
                const chunk = imagesData.slice(i, i + perPage);
                preview.appendChild(createPageElement(chunk, config));
            }
        }

        async function handleSavePDF() {
            if (imagesData.length === 0) return alert("画像を選択してください");
            
            const btn = document.getElementById('pdf-btn');
            const originalText = btn.textContent;
            
            let fileName = document.getElementById('output-filename').value.trim();
            if (!fileName) fileName = 'image_catalog';
            if (!fileName.endsWith('.pdf')) fileName += '.pdf';

            btn.textContent = "生成中...";
            btn.disabled = true;

            const pageSize = document.getElementById('page-size').value;
            const orientation = document.getElementById('orientation').value;
            const cols = parseInt(document.getElementById('cols').value) || 1;
            const rows = parseInt(document.getElementById('rows').value) || 1;
            const perPage = cols * rows;

            const config = {
                w: (pageSize === 'a3' ? (orientation === 'l' ? '420mm' : '297mm') : (orientation === 'l' ? '297mm' : '210mm')),
                h: (pageSize === 'a3' ? (orientation === 'l' ? '297mm' : '420mm') : (orientation === 'l' ? '210mm' : '297mm')),
                cols, rows
            };

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: orientation,
                unit: 'mm',
                format: pageSize,
                compress: false
            });

            const workingArea = document.getElementById('working-area');

            try {
                for (let i = 0; i < imagesData.length; i += perPage) {
                    if (i > 0) pdf.addPage();
                    
                    const chunk = imagesData.slice(i, i + perPage);
                    const pageEl = createPageElement(chunk, config);
                    pageEl.style.boxShadow = 'none';
                    workingArea.appendChild(pageEl);

                    const imgs = pageEl.querySelectorAll('img');
                    await Promise.all(Array.from(imgs).map(img => {
                        if (img.complete) return Promise.resolve();
                        return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                    }));

                    await new Promise(r => setTimeout(r, 500));

                    const canvas = await html2canvas(pageEl, {
                        scale: 2.5,
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        width: pageEl.offsetWidth,
                        height: pageEl.offsetHeight
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight(), undefined, 'FAST');
                    
                    workingArea.innerHTML = '';
                    btn.textContent = `生成中 (${Math.min(i + perPage, imagesData.length)} / ${imagesData.length})`;
                }

                pdf.save(fileName);
            } catch (err) {
                console.error(err);
                alert("PDF作成中にエラーが発生しました。");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
                workingArea.innerHTML = '';
            }
        }
    </script>
</body>
</html>
